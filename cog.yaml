build:
  gpu: true
  cuda: "12.3"
  python_version: "3.11"
  python_packages:
    - "tensorflow==2.16.2"
    - "keras>=3.0"
    - "huggingface_hub>=0.24.0"
    - "pillow>=10.0.0"
    - "numpy>=1.26.0"
  system_packages:
    - libgl1
    - libglib2.0-0
  run:
    - command: python -c "import os; os.environ['HF_TOKEN']=open('/run/secrets/HF_TOKEN').read().strip(); from huggingface_hub import snapshot_download; snapshot_download(repo_id='dv00005/Skin_Tone_Detection_Model', local_dir='/src/weights/skin-tone', token=os.environ['HF_TOKEN'])"
      mounts:
        - type: secret
          id: HF_TOKEN
          target: /run/secrets/HF_TOKEN

predict: "predict.py:Predictor"
